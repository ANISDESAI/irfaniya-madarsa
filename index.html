<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Irfaniya Masjid & Madarsa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background-image:url("background.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
min-height:100vh;
color:#2c3e50;
}

/* HEADER */

header{
text-align:center;
padding:40px 15px 20px;
color:#fff;
text-shadow:0 2px 5px rgba(0,0,0,0.7);
}

header h1{font-size:34px;}

.urdu{
font-family:'Noto Nastaliq Urdu',serif;
font-size:24px;
}

/* CONTAINER */

.container{max-width:1100px;margin:auto;padding:20px;}

/* CARD */

.card{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(12px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
margin-bottom:25px;
}

/* SUMMARY */

.totals-container{
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
}

.total-box{
flex:1;
padding:25px 20px;
border-radius:15px;
text-align:center;
font-weight:600;
color:#fff;
font-size:18px;
}

.total-box h3{margin-bottom:12px;font-size:16px;}

.total-donation{background:linear-gradient(135deg,#00c853,#66ff66);}
.total-used{background:linear-gradient(135deg,#d50000,#ff6659);}
.total-balance{background:linear-gradient(135deg,#ffb300,#ffe066);color:#004d00;}

/* BUTTON GROUP (UNCHANGED SIZE) */

.button-group{
display:flex;
gap:15px;
margin-top:20px;
}

.button-group button{
flex:1;
padding:12px 18px;
border:none;
border-radius:35px;
font-size:15px;
font-weight:600;
background:linear-gradient(135deg,#00c853,#64dd17);
color:#fff;
cursor:pointer;
}

/* TABLE */

.table-wrapper{overflow-x:auto;margin-top:20px;}

table{width:100%;border-collapse:collapse;}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid rgba(0,0,0,0.1);
font-size:14px;
}

th{background:rgba(0,200,83,0.3);color:#004d00;}

</style>
</head>

<body>

<header>
<h1>🕌 Irfaniya Masjid & Madarsa</h1>
<div class="urdu">مدرسہ عرفانیہ مسجد</div>
</header>

<div class="container">

<!-- SUMMARY -->

<div class="card">

<h2>Summary</h2>

<div class="totals-container">

<div class="total-box total-donation">
<h3>Total Donation</h3>
<div id="donationCounter">₹ 0</div>
</div>

<div class="total-box total-used">
<h3>Donation Used</h3>
<div id="donationUsed">₹ 0</div>
</div>

<div class="total-box total-balance">
<h3>Balance</h3>
<div id="balance">₹ 0</div>
</div>

</div>

</div>

<!-- MANAGE -->

<div class="card">

<h2>Manage Donations & Funds</h2>

<div class="button-group">
<button onclick="showSection('donation')">Donation List</button>
<button onclick="showSection('kharcha')">Fund Used List</button>
</div>

<div id="donation" style="display:none;" class="table-wrapper">
<table id="donationTable"></table>
</div>

<div id="kharcha" style="display:none;" class="table-wrapper">
<table id="kharchaTable"></table>
</div>

</div>

</div>

<script>

/* SHOW SECTION */

function showSection(id){

document.getElementById('donation').style.display='none';
document.getElementById('kharcha').style.display='none';

document.getElementById(id).style.display='block';

}

/* INDIAN DATE FORMAT */

function formatIndianDate(dateString){

if(!dateString) return "-";

const d=new Date(dateString);

const day=("0"+d.getDate()).slice(-2);
const month=("0"+(d.getMonth()+1)).slice(-2);
const year=d.getFullYear();

return day+"-"+month+"-"+year;

}

/* GOOGLE SHEET */

const API_URL="https://script.google.com/macros/s/AKfycbx4lP00Q3kbRpq3ajbBxPDpgSp7QHecEKcoPNtH4mhqalnsDbAQlGB2pLSKtXIOya1i/exec";

let donationList=[];
let kharchaList=[];

async function fetchData(){

try{

const res=await fetch(API_URL);
const data=await res.json();

donationList=data.donations||[];
kharchaList=data.kharcha||[];

renderTables();
calculateTotals();

}catch(e){

console.log("Data load error",e);

}

}

/* TABLE RENDER */

function renderTables(){

donationTable.innerHTML=`<tr>
<th>#</th><th>Name</th><th>Amount</th><th>Method</th><th>Date</th>
</tr>`;

kharchaTable.innerHTML=`<tr>
<th>#</th><th>Purpose</th><th>Amount</th><th>Date</th><th>Paid From</th>
</tr>`;

donationList.forEach((d,i)=>{

let r=donationTable.insertRow();

r.insertCell(0).innerText=i+1;
r.insertCell(1).innerText=d.Name||"Anonymous";
r.insertCell(2).innerText="₹ "+(d.Amount||0);
r.insertCell(3).innerText=d.Method||"-";
r.insertCell(4).innerText=formatIndianDate(d.Date);

});

kharchaList.forEach((k,i)=>{

let r=kharchaTable.insertRow();

r.insertCell(0).innerText=i+1;
r.insertCell(1).innerText=k.Purpose||"-";
r.insertCell(2).innerText="₹ "+(k.Amount||0);
r.insertCell(3).innerText=formatIndianDate(k.Date);
r.insertCell(4).innerText=k.PaidFrom||"-";

});

}

/* TOTALS */

function calculateTotals(){

let totalDonation=donationList.reduce((s,d)=>s+Number(d.Amount||0),0);
let totalUsed=kharchaList.reduce((s,k)=>s+Number(k.Amount||0),0);

document.getElementById("donationCounter").innerText="₹ "+totalDonation;
document.getElementById("donationUsed").innerText="₹ "+totalUsed;
document.getElementById("balance").innerText="₹ "+(totalDonation-totalUsed);

}

fetchData();

</script>

</body>
</html>
