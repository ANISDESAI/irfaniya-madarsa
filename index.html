<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Irfaniya Masjid & Madarsa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
color:#2c3e50;

background-image:url("background.jpeg");
background-size:contain;
background-position:top center;
background-repeat:no-repeat;
background-color:#e8f5e9;

min-height:100vh;

}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

header{
text-align:center;
padding:40px 15px 20px;
}

header h1{
font-size:34px;
color:#006400;
}

.urdu{
font-family:'Noto Nastaliq Urdu',serif;
font-size:24px;
color:#004d00;
}

.card{

background:rgba(255,255,255,0.92);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
margin-bottom:25px;

}

.prayer-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.prayer-box{

background:#fff;
padding:12px;
border-radius:10px;
text-align:center;
font-weight:600;
color:#006400;

}

.prayer-time{

display:block;
margin-top:5px;

}

table{
width:100%;
border-collapse:collapse;
}

th,td{

padding:10px;
text-align:center;
border-bottom:1px solid #ddd;

}

th{
background:#dcedc8;
}

</style>

</head>

<body>

<header>

<h1>🕌 Irfaniya Masjid & Madarsa</h1>

<div class="urdu">مدرسہ عرفانیہ مسجد</div>

</header>

<div class="container">

<div class="card">

<h2>Namaz Timings (Mumbai)</h2>

<div class="prayer-grid">

<div class="prayer-box">
Fajr
<span class="prayer-time" id="fajrClock">Loading...</span>
</div>

<div class="prayer-box">
Zohar
<span class="prayer-time" id="dhuhrClock">Loading...</span>
</div>

<div class="prayer-box">
Asar
<span class="prayer-time" id="asrClock">Loading...</span>
</div>

<div class="prayer-box">
Maghrib
<span class="prayer-time" id="maghribClock">Loading...</span>
</div>

<div class="prayer-box">
Isha
<span class="prayer-time" id="ishaClock">Loading...</span>
</div>

<div class="prayer-box">
Juma
<span class="prayer-time">01:30 PM</span>
</div>

</div>

</div>

<div class="card">

<h2>Donation List</h2>

<div style="overflow-x:auto">

<table id="donationTable">

<tr>
<th>#</th>
<th>Name</th>
<th>Amount</th>
<th>Method</th>
<th>Date</th>
</tr>

</table>

</div>

</div>

</div>

<script>

async function fetchPrayerTimes(){

try{

const response=await fetch("https://api.aladhan.com/v1/timingsByCity?city=Mumbai&country=India&method=2");

const data=await response.json();

const t=data.data.timings;

document.getElementById("fajrClock").innerText=t.Fajr;
document.getElementById("dhuhrClock").innerText=t.Dhuhr;
document.getElementById("asrClock").innerText=t.Asr;
document.getElementById("maghribClock").innerText=t.Maghrib;
document.getElementById("ishaClock").innerText=t.Isha;

}catch(e){

console.log(e);

}

}

fetchPrayerTimes();

const API_URL="https://script.google.com/macros/s/AKfycbx4lP00Q3kbRpq3ajbBxPDpgSp7QHecEKcoPNtH4mhqalnsDbAQlGB2pLSKtXIOya1i/exec";

async function fetchData(){

try{

const res=await fetch(API_URL);

const data=await res.json();

const list=data.donations||[];

const table=document.getElementById("donationTable");

list.forEach((d,i)=>{

let r=table.insertRow();

r.insertCell(0).innerText=i+1;
r.insertCell(1).innerText=d.Name||"Anonymous";
r.insertCell(2).innerText=d.Amount||0;
r.insertCell(3).innerText=d.Method||"-";
r.insertCell(4).innerText=d.Date||"-";

});

}catch(e){

console.log("Data fetch error",e);

}

}

fetchData();

</script>

</body>
</html>
