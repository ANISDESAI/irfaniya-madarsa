<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Irfaniya Masjid & Madarsa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
color:#2c3e50;

background-image:url("background.jpeg");
background-size:cover;
background-position:center top;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;

}

/* HEADER */

header{
text-align:center;
padding:20px 10px;
color:#fff;
text-shadow:0 2px 5px rgba(0,0,0,0.7);
}

header h1{
font-size:28px;
}

.urdu{
font-family:'Noto Nastaliq Urdu',serif;
font-size:20px;
}

/* CONTAINER */

.container{
max-width:850px;
margin:auto;
padding:10px;
}

/* GLASS CARD */

.card{

background:rgba(255,255,255,0.25);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);

border-radius:15px;
padding:12px;
margin-bottom:12px;

box-shadow:0 5px 20px rgba(0,0,0,0.2);

}

/* NAMAZ GRID SMALL */

.prayer-grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;

}

.prayer-box{

background:rgba(255,255,255,0.35);
backdrop-filter:blur(6px);

padding:6px;
border-radius:8px;
text-align:center;

font-size:12px;
font-weight:600;

}

.prayer-time{

display:block;
font-size:12px;
margin-top:2px;

}

/* SUMMARY */

.totals-container{

display:flex;
gap:8px;
flex-wrap:wrap;

}

.total-box{

flex:1;
padding:10px;
border-radius:10px;
text-align:center;
color:#fff;
font-size:13px;

}

.total-donation{background:#27ae60;}
.total-used{background:#e74c3c;}
.total-balance{background:#f1c40f;color:#000;}

/* BUTTONS */

.button-group{

display:flex;
gap:10px;
margin-top:10px;

}

.button-group button{

flex:1;
padding:10px;
border:none;
border-radius:25px;

background:#2ecc71;
color:#fff;

font-weight:600;
cursor:pointer;

}

/* TABLE */

.table-wrapper{
overflow-x:auto;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.4);
font-size:13px;
color:#000;
}

th{
background:rgba(255,255,255,0.5);
}

</style>

</head>

<body>

<header>

<h1>🕌 Irfaniya Masjid & Madarsa</h1>
<div class="urdu">مدرسہ عرفانیہ مسجد</div>

</header>

<div class="container">

<!-- NAMAZ -->

<div class="card">

<div class="prayer-grid">

<div class="prayer-box">
Fajr
<span class="prayer-time" id="fajrClock">--</span>
</div>

<div class="prayer-box">
Zohar
<span class="prayer-time" id="dhuhrClock">--</span>
</div>

<div class="prayer-box">
Asar
<span class="prayer-time" id="asrClock">--</span>
</div>

<div class="prayer-box">
Maghrib
<span class="prayer-time" id="maghribClock">--</span>
</div>

<div class="prayer-box">
Isha
<span class="prayer-time" id="ishaClock">--</span>
</div>

<div class="prayer-box">
Juma
<span class="prayer-time">01:30 PM</span>
</div>

</div>

</div>

<!-- SUMMARY -->

<div class="card">

<div class="totals-container">

<div class="total-box total-donation">
Total Donation
<div id="donationCounter">₹0</div>
</div>

<div class="total-box total-used">
Used
<div id="donationUsed">₹0</div>
</div>

<div class="total-box total-balance">
Balance
<div id="balance">₹0</div>
</div>

</div>

</div>

<!-- BUTTONS -->

<div class="card">

<div class="button-group">

<button onclick="showSection('donation')">
Donation List
</button>

<button onclick="showSection('kharcha')">
Fund Used
</button>

</div>

<div id="donation" class="table-wrapper" style="display:none;">
<table id="donationTable"></table>
</div>

<div id="kharcha" class="table-wrapper" style="display:none;">
<table id="kharchaTable"></table>
</div>

</div>

</div>

<script>

/* SHOW TABLE */

function showSection(id){

document.getElementById('donation').style.display='none';
document.getElementById('kharcha').style.display='none';

document.getElementById(id).style.display='block';

}

/* PRAYER TIME */

async function fetchPrayerTimes(){

try{

const res=await fetch("https://api.aladhan.com/v1/timingsByCity?city=Mumbai&country=India&method=2");

const data=await res.json();

const t=data.data.timings;

document.getElementById("fajrClock").innerText=t.Fajr;
document.getElementById("dhuhrClock").innerText=t.Dhuhr;
document.getElementById("asrClock").innerText=t.Asr;
document.getElementById("maghribClock").innerText=t.Maghrib;
document.getElementById("ishaClock").innerText=t.Isha;

}catch(e){
console.log(e);
}

}

fetchPrayerTimes();

/* GOOGLE SHEET DATA */

const API_URL="https://script.google.com/macros/s/AKfycbx4lP00Q3kbRpq3ajbBxPDpgSp7QHecEKcoPNtH4mhqalnsDbAQlGB2pLSKtXIOya1i/exec";

async function fetchData(){

try{

const res=await fetch(API_URL);

const data=await res.json();

const donations=data.donations||[];

const table=document.getElementById("donationTable");

table.innerHTML="<tr><th>#</th><th>Name</th><th>Amount</th><th>Method</th><th>Date</th></tr>";

donations.forEach((d,i)=>{

let r=table.insertRow();

r.insertCell(0).innerText=i+1;
r.insertCell(1).innerText=d.Name||"Anonymous";
r.insertCell(2).innerText=d.Amount||0;
r.insertCell(3).innerText=d.Method||"-";
r.insertCell(4).innerText=d.Date||"-";

});

}catch(e){
console.log(e);
}

}

fetchData();

</script>

</body>
</html>
