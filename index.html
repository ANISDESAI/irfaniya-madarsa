<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Irfaniya Masjid & Madarsa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background-image:url("background.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

min-height:100vh;
color:#222;

}

/* HEADER */

header{
text-align:center;
padding:20px;
color:#fff;
text-shadow:0 2px 5px rgba(0,0,0,0.6);
}

header h1{
font-size:28px;
}

.urdu{
font-family:'Noto Nastaliq Urdu',serif;
font-size:20px;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:10px;
}

/* GLASS CARD */

.card{

background:rgba(255,255,255,0.25);
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);

border-radius:15px;
padding:15px;
margin-bottom:15px;

box-shadow:0 5px 20px rgba(0,0,0,0.2);

}

/* SUMMARY */

.totals-container{

display:flex;
gap:10px;
flex-wrap:wrap;

}

.total-box{

flex:1;
padding:12px;
border-radius:10px;
text-align:center;
color:#fff;
font-size:14px;

}

.total-donation{background:#27ae60;}
.total-used{background:#e74c3c;}
.total-balance{background:#f1c40f;color:#000;}

/* BUTTONS */

.button-group{

display:flex;
gap:10px;
margin-top:10px;

}

.button-group button{

flex:1;
padding:10px;
border:none;
border-radius:25px;

background:#2ecc71;
color:#fff;

font-weight:600;
cursor:pointer;

}

/* TABLE */

.table-wrapper{
overflow-x:auto;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.5);
font-size:13px;
background:rgba(255,255,255,0.7);
}

th{
background:rgba(255,255,255,0.9);
}

</style>

</head>

<body>

<header>

<h1>🕌 Irfaniya Masjid & Madarsa</h1>
<div class="urdu">مدرسہ عرفانیہ مسجد</div>

</header>

<div class="container">

<!-- SUMMARY -->

<div class="card">

<div class="totals-container">

<div class="total-box total-donation">
Total Donation
<div id="donationCounter">₹0</div>
</div>

<div class="total-box total-used">
Donation Used
<div id="donationUsed">₹0</div>
</div>

<div class="total-box total-balance">
Balance
<div id="balance">₹0</div>
</div>

</div>

</div>

<!-- BUTTONS -->

<div class="card">

<div class="button-group">

<button onclick="showSection('donation')">
Donation List
</button>

<button onclick="showSection('kharcha')">
Fund Used List
</button>

</div>

<div id="donation" class="table-wrapper" style="display:none;">
<table id="donationTable"></table>
</div>

<div id="kharcha" class="table-wrapper" style="display:none;">
<table id="kharchaTable"></table>
</div>

</div>

</div>

<script>

function showSection(id){

document.getElementById('donation').style.display='none';
document.getElementById('kharcha').style.display='none';

document.getElementById(id).style.display='block';

}

/* DATE FORMAT INDIA */

function formatIndianDate(dateString){

if(!dateString) return "-";

const d=new Date(dateString);

const day=("0"+d.getDate()).slice(-2);
const month=("0"+(d.getMonth()+1)).slice(-2);
const year=d.getFullYear();

return day+"-"+month+"-"+year;

}

/* GOOGLE SHEET */

const API_URL="https://script.google.com/macros/s/AKfycbx4lP00Q3kbRpq3ajbBxPDpgSp7QHecEKcoPNtH4mhqalnsDbAQlGB2pLSKtXIOya1i/exec";

let donationList=[];
let kharchaList=[];

async function fetchData(){

try{

const res=await fetch(API_URL);
const data=await res.json();

donationList=data.donations||[];
kharchaList=data.kharcha||[];

renderTables();
calculateTotals();

}catch(e){

console.log("Fetch error",e);

}

}

function renderTables(){

const dTable=document.getElementById("donationTable");
const kTable=document.getElementById("kharchaTable");

dTable.innerHTML="<tr><th>#</th><th>Name</th><th>Amount</th><th>Method</th><th>Date</th></tr>";

kTable.innerHTML="<tr><th>#</th><th>Purpose</th><th>Amount</th><th>Date</th></tr>";

donationList.forEach((d,i)=>{

let r=dTable.insertRow();

r.insertCell(0).innerText=i+1;
r.insertCell(1).innerText=d.Name||"Anonymous";
r.insertCell(2).innerText="₹ "+(d.Amount||0);
r.insertCell(3).innerText=d.Method||"-";
r.insertCell(4).innerText=formatIndianDate(d.Date);

});

kharchaList.forEach((k,i)=>{

let r=kTable.insertRow();

r.insertCell(0).innerText=i+1;
r.insertCell(1).innerText=k.Purpose||"-";
r.insertCell(2).innerText="₹ "+(k.Amount||0);
r.insertCell(3).innerText=formatIndianDate(k.Date);

});

}

function calculateTotals(){

let totalDonation=donationList.reduce((s,d)=>s+parseInt(d.Amount||0),0);
let totalUsed=kharchaList.reduce((s,k)=>s+parseInt(k.Amount||0),0);

document.getElementById("donationCounter").innerText="₹ "+totalDonation;
document.getElementById("donationUsed").innerText="₹ "+totalUsed;
document.getElementById("balance").innerText="₹ "+(totalDonation-totalUsed);

}

fetchData();

</script>

</body>
</html>
