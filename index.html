<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irfaniya Masjid & Madarsa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Nastaliq+Urdu:wght@600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  color:#2c3e50;

  /* Background Image */
  background:
    linear-gradient(rgba(255,255,255,0.80),rgba(255,255,255,0.80)),
    url("background.jpeg");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;

  min-height:100vh;
}

/* Mobile fix */
@media (max-width:768px){
  body{
    background-attachment:scroll;
  }
}

.lang-buttons{
  display:flex;
  gap:15px;
}

.lang-buttons button{
  padding:6px 15px;
  border:none;
  border-radius:50px;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  color:#fff;
}

#btnEn{background:linear-gradient(135deg,#2196F3,#64B5F6);}
#btnHi{background:linear-gradient(135deg,#FF5722,#FF8A65);}

.lang-buttons button:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 12px rgba(0,0,0,0.3);
}

.lang-buttons button.active{
  box-shadow:0 0 0 3px rgba(0,0,0,0.2);
}

header{text-align:center;padding:40px 15px 20px;}

header h1{
  font-size:34px;
  color:#006400;
}

.urdu{
  font-family:'Noto Nastaliq Urdu',serif;
  font-size:24px;
  color:#004d00;
}

.header-subtitle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:5px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  margin-bottom:25px;
}

.totals-container{
  display:flex;
  justify-content:space-between;
  gap:20px;
  margin-top:10px;
  flex-wrap:wrap;
}

.total-box{
  flex:1;
  padding:25px 20px;
  border-radius:15px;
  text-align:center;
  font-weight:600;
  color:#fff;
  font-size:18px;
}

.total-box h3{
  margin-bottom:12px;
  font-size:16px;
}

.total-donation{background:linear-gradient(135deg,#00c853,#66ff66);}
.total-used{background:linear-gradient(135deg,#d50000,#ff6659);}
.total-balance{background:linear-gradient(135deg,#ffb300,#ffe066);color:#004d00;}

.button-group{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.button-group button{
  flex:1;
  padding:12px 18px;
  border:none;
  border-radius:35px;
  font-size:15px;
  font-weight:600;
  background:linear-gradient(135deg,#00c853,#64dd17);
  color:#fff;
  cursor:pointer;
}

.table-wrapper{
  overflow-x:auto;
  margin-top:20px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(0,0,0,0.1);
  font-size:14px;
}

th{
  background:rgba(0,200,83,0.3);
  color:#004d00;
}

.prayer-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px 40px;
  margin-top:15px;
}

.prayer-box{
  background:rgba(255,255,255,0.6);
  padding:12px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  color:#006400;
  text-align:center;
}

.prayer-time{
  display:block;
  margin-top:4px;
  font-weight:500;
}

</style>
</head>

<body>

<header>

<h1>🕌 Irfaniya Masjid & Madarsa</h1>

<div class="urdu">مدرسہ عرفانیہ مسجد</div>

<div class="header-subtitle">

<div class="subtitle" id="subtitle">
Donation & Funds Management
</div>

<div class="lang-buttons">
<button id="btnEn" class="active" onclick="setLanguage('en')">English</button>
<button id="btnHi" onclick="setLanguage('hi')">हिन्दी</button>
</div>

</div>

</header>

<div class="container">

<div class="card">

<h2 id="namazTitle">Namaz Timings (Mumbai)</h2>

<div class="prayer-grid">

<div class="prayer-box">
Fajr
<span class="prayer-time" id="fajrClock">Loading...</span>
</div>

<div class="prayer-box">
Maghrib
<span class="prayer-time" id="maghribClock">Loading...</span>
</div>

<div class="prayer-box">
Zohar
<span class="prayer-time" id="dhuhrClock">Loading...</span>
</div>

<div class="prayer-box">
Isha
<span class="prayer-time" id="ishaClock">Loading...</span>
</div>

<div class="prayer-box">
Asar
<span class="prayer-time" id="asrClock">Loading...</span>
</div>

<div class="prayer-box">
Juma
<span class="prayer-time">01:30 PM</span>
</div>

</div>
</div>

<div class="card">

<h2>Summary</h2>

<div class="totals-container">

<div class="total-box total-donation">
<h3>Total Donation</h3>
<div id="donationCounter">₹ 0</div>
</div>

<div class="total-box total-used">
<h3>Donation Used</h3>
<div id="donationUsed">₹ 0</div>
</div>

<div class="total-box total-balance">
<h3>Balance</h3>
<div id="balance">₹ 0</div>
</div>

</div>
</div>

</div>

<script>

async function fetchPrayerTimesMumbai(){

try{

const response = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Mumbai&country=India&method=2");

const data = await response.json();

const t = data.data.timings;

document.getElementById("fajrClock").innerText = t.Fajr;
document.getElementById("dhuhrClock").innerText = t.Dhuhr;
document.getElementById("asrClock").innerText = t.Asr;
document.getElementById("maghribClock").innerText = t.Maghrib;
document.getElementById("ishaClock").innerText = t.Isha;

}catch(e){

console.log(e);

}

}

fetchPrayerTimesMumbai();

</script>

</body>
</html>
